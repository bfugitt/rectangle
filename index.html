<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rectangle Architect - Area & Perimeter Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-brown: #5d4037;
            --leaf-green: #81a263;
            --clay-orange: #e67e5f;
            --cream-paper: #fdfaf1;
            --soft-black: #333333;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f4eee0;
            color: var(--soft-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .retro-card {
            background-color: var(--cream-paper);
            border: 3px solid var(--earth-brown);
            border-radius: 40px 15px 40px 15px;
            box-shadow: 8px 8px 0px var(--earth-brown);
            max-width: 850px;
            width: 95%;
            max-height: 98vh;
            padding: 1rem 2rem;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: 'Gaegu', cursive;
            color: var(--earth-brown);
            font-size: clamp(2rem, 5vh, 3rem);
            line-height: 1;
        }

        .organic-btn {
            background-color: var(--leaf-green);
            color: white;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 700;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0px #5e7a45;
            white-space: nowrap;
        }

        .organic-btn:hover { transform: translateY(-2px); background-color: #6e8c52; }
        .organic-btn:active { transform: translateY(2px); box-shadow: 0 0px 0px #5e7a45; }

        .mode-toggle {
            display: flex;
            background: #e9e2d0;
            padding: 4px;
            border-radius: 30px;
            border: 2px solid var(--earth-brown);
        }

        .mode-btn {
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--earth-brown);
            color: white;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-field {
            background: #fff;
            border: 2px dashed var(--earth-brown);
            border-radius: 12px;
            padding: 6px;
            width: 85px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--clay-orange);
            font-weight: bold;
        }

        .input-field:focus { outline: none; border-style: solid; background-color: #fffdf5; }

        .help-tip-btn {
            position: absolute;
            right: -12px;
            top: 22px;
            background: var(--clay-orange);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid var(--earth-brown);
            z-index: 10;
        }

        #shape-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            position: relative;
        }

        .blueprint-shape {
            fill: rgba(129, 162, 99, 0.15);
            stroke: var(--earth-brown);
            stroke-width: 4;
            stroke-linejoin: round;
            stroke-linecap: round;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .guide-line {
            stroke: var(--earth-brown);
            stroke-width: 2;
            stroke-dasharray: 4;
            opacity: 0.3;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .segment-label {
            font-weight: 700;
            font-size: 16px;
            fill: var(--earth-brown);
            text-anchor: middle;
            animation: fadeIn 0.8s ease;
        }

        .unknown-label {
            fill: var(--clay-orange);
            font-size: 19px;
            text-decoration: underline;
            font-weight: 800;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .status-msg { min-height: 1.5rem; font-weight: 700; font-size: 1rem; }
        .score-pill { background: var(--earth-brown); color: var(--cream-paper); padding: 4px 15px; border-radius: 20px; font-size: 0.9rem; }
        .locked { background-color: #f1f1f1; border-style: solid; color: #888; }

        #help-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: white;
            border: 3px solid var(--earth-brown);
            border-radius: 25px;
            padding: 1.5rem;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 90;
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="closeHelp()"></div>
    
    <div id="help-modal">
        <h3 id="help-title" class="text-xl font-bold mb-2 text-stone-800">Architect's Tip</h3>
        <p id="help-text" class="text-stone-600 mb-4"></p>
        <button onclick="closeHelp()" class="w-full py-3 bg-stone-200 rounded-xl font-bold hover:bg-stone-300 transition-colors">Got it!</button>
    </div>

    <div class="retro-card">
        <div class="flex justify-between items-center mb-2">
            <div class="score-pill">Score: <span id="score">0</span></div>
            <div class="mode-toggle">
                <div id="mode-normal" class="mode-btn active" onclick="setMode('normal')">Standard</div>
                <div id="mode-challenge" class="mode-btn" onclick="setMode('challenge')">Challenge</div>
            </div>
        </div>

        <header class="text-center mb-2">
            <h1>Rectangle Architect</h1>
            <p id="sub-title" class="text-stone-500 font-medium">Solve for the missing blueprint dimensions.</p>
        </header>

        <div id="shape-container">
            <svg id="svg-viz" width="400" height="280" viewBox="0 0 400 280"></svg>
        </div>

        <div id="inputs-grid" class="grid grid-cols-4 gap-4 mb-4 bg-stone-100 p-5 rounded-2xl border-2 border-stone-200 shadow-inner"></div>

        <div id="feedback" class="status-msg text-center mb-3"></div>

        <div class="flex flex-wrap justify-center gap-4 mb-2">
            <button onclick="checkAnswer()" class="organic-btn">Check Blueprint!</button>
            <button onclick="generateProblem()" class="organic-btn" style="background-color: var(--clay-orange); box-shadow: 0 4px 0px #b05a41;">New Project</button>
        </div>
    </div>

    <script>
        let mode = 'normal';
        let currentProblem = {};
        let score = 0;

        const svg = document.getElementById('svg-viz');
        const grid = document.getElementById('inputs-grid');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');

        const tips = {
            normal: {
                l: "<b>To find Length:</b><br>If you have Area: Area ÷ Width.<br>If you have Perimeter: (Perimeter ÷ 2) - Width.",
                w: "<b>To find Width:</b><br>If you have Area: Area ÷ Length.<br>If you have Perimeter: (Perimeter ÷ 2) - Length.",
                a: "Area is the space inside! Multiply Length by Width (L × W).",
                p: "Perimeter is the distance around. Add all 4 sides: L + L + W + W."
            },
            challenge: {
                side: "<b>The Matching Rule:</b><br>Horizontal sides must balance! The top width equals the two bottom horizontal segments added together.<br><br>Vertical sides must balance! The left height equals the two right vertical segments added together.",
                a: "<b>Split it up!</b> Look at the dotted lines. You can split this into two rectangles. Calculate Area A and Area B, then add them!",
                p: "<b>Walk the edge:</b> Add all 6 outer sides. Don't include the dotted lines in the middle!"
            }
        };

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('mode-normal').classList.toggle('active', mode === 'normal');
            document.getElementById('mode-challenge').classList.toggle('active', mode === 'challenge');
            document.getElementById('sub-title').innerText = mode === 'normal' ? "Standard Rectangles" : "Composite L-Shapes";
            generateProblem();
        }

        function generateProblem() {
            feedback.innerText = "";
            feedback.className = "status-msg text-center mb-3";
            svg.innerHTML = "";
            grid.innerHTML = "";

            if (mode === 'normal') {
                createNormalProblem();
            } else {
                createChallengeProblem();
            }
        }

        function createNormalProblem() {
            const l = Math.floor(Math.random() * 7) + 4;
            const w = Math.floor(Math.random() * 7) + 4;
            currentProblem = { l, w, a: l * w, p: 2 * (l + w), type: 'normal' };

            const fields = [
                { id: 'l', label: 'Length', val: l },
                { id: 'w', label: 'Width', val: w },
                { id: 'a', label: 'Area', val: currentProblem.a },
                { id: 'p', label: 'Perimeter', val: currentProblem.p }
            ];

            // Always provide at least 2 pieces of info
            const hideIdx = [];
            while(hideIdx.length < 2) {
                let r = Math.floor(Math.random() * 4);
                if(!hideIdx.includes(r)) hideIdx.push(r);
            }

            fields.forEach((f, i) => addInputField(f, hideIdx.includes(i)));
            drawRect(l, w, hideIdx);
        }

        function createChallengeProblem() {
            // Logic-Safe Generation:
            // Side A (Full Left) = Side C (Right outer) + Side E (Inner Vertical)
            // Side B (Full Top) = Side D (Bottom outer) + Side F (Inner Horizontal)
            const h_tot = Math.floor(Math.random() * 4) + 7; 
            const w_tot = Math.floor(Math.random() * 4) + 7; 
            const h_cut = Math.floor(Math.random() * 3) + 2; 
            const w_cut = Math.floor(Math.random() * 3) + 2; 
            
            const sA = h_tot; 
            const sB = w_tot; 
            const sC = h_tot - h_cut; 
            const sD = w_tot - w_cut; 
            const sE = h_cut; 
            const sF = w_cut; 
            
            const area = (sA * sD) + (sC * sF);
            const perimeter = sA + sB + sC + sD + sE + sF;

            currentProblem = { sA, sB, sC, sD, sE, sF, a: area, p: perimeter, type: 'challenge' };

            const fields = [
                { id: 'sA', label: 'Side A', val: sA },
                { id: 'sB', label: 'Side B', val: sB },
                { id: 'sC', label: 'Side C', val: sC },
                { id: 'sD', label: 'Side D', val: sD },
                { id: 'sE', label: 'Side E', val: sE },
                { id: 'sF', label: 'Side F', val: sF },
                { id: 'a', label: 'Total Area', val: area },
                { id: 'p', label: 'Perimeter', val: perimeter }
            ];

            // LOGIC-SAFE HIDING: 
            // 1. Always hide Area and Perimeter for the challenge
            // 2. Hide ONE missing vertical (E or C or A) - ensuring others are shown
            // 3. Hide ONE missing horizontal (F or D or B) - ensuring others are shown
            const hideThese = [6, 7]; 
            
            // Choose one vertical to hide
            const vOptions = [0, 2, 4];
            hideThese.push(vOptions[Math.floor(Math.random() * 3)]);
            
            // Choose one horizontal to hide
            const hOptions = [1, 3, 5];
            hideThese.push(hOptions[Math.floor(Math.random() * 3)]);

            fields.forEach((f, i) => addInputField(f, hideThese.includes(i)));
            drawLShape(currentProblem, hideThese);
        }

        function addInputField(field, isHidden) {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper";
            wrapper.innerHTML = `
                <label class="text-[10px] uppercase font-bold text-stone-500 mb-1">${field.label}</label>
                <input type="number" id="in-${field.id}" class="input-field ${!isHidden ? 'locked' : ''}" 
                       value="${!isHidden ? field.val : ''}" ${!isHidden ? 'disabled' : ''}>
                ${isHidden ? `<div class="help-tip-btn" onclick="showHelp('${field.id}')">?</div>` : ''}
            `;
            grid.appendChild(wrapper);
        }

        function drawRect(l, w, hidden) {
            const sc = 18;
            const ox = (400 - w * sc) / 2;
            const oy = (280 - l * sc) / 2;
            
            const shape = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            shape.setAttribute("x", ox);
            shape.setAttribute("y", oy);
            shape.setAttribute("width", w * sc);
            shape.setAttribute("height", l * sc);
            shape.setAttribute("rx", "10");
            shape.setAttribute("class", "blueprint-shape");
            svg.appendChild(shape);

            addLabel(ox - 35, oy + (l*sc)/2, hidden.includes(0) ? "L" : l, hidden.includes(0));
            addLabel(ox + (w*sc)/2, oy - 15, hidden.includes(1) ? "W" : w, hidden.includes(1));
        }

        function drawLShape(p, hidden) {
            const sc = 16; 
            const ox = 80, oy = 40; 
            
            const wT = p.sB * sc;
            const hL = p.sA * sc;
            const hR = p.sC * sc;
            const wI = p.sF * sc;
            const hI = p.sE * sc;
            const wB = p.sD * sc;

            // Draw L-shape
            const pathStr = `M ${ox},${oy} h ${wT} v ${hR} h -${wI} v ${hI} h -${wB} z`;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathStr);
            path.setAttribute("class", "blueprint-shape");
            svg.appendChild(path);

            // Add Guide Line for additive area (The "Cut")
            const guide = document.createElementNS("http://www.w3.org/2000/svg", "line");
            guide.setAttribute("x1", ox + wB);
            guide.setAttribute("y1", oy + hR);
            guide.setAttribute("x2", ox + wT);
            guide.setAttribute("y2", oy + hR);
            guide.setAttribute("class", "guide-line");
            svg.appendChild(guide);

            // Labels
            addLabel(ox - 30, oy + hL/2, hidden.includes(0) ? "A" : p.sA, hidden.includes(0));
            addLabel(ox + wT/2, oy - 15, hidden.includes(1) ? "B" : p.sB, hidden.includes(1));
            addLabel(ox + wT + 30, oy + hR/2, hidden.includes(2) ? "C" : p.sC, hidden.includes(2));
            addLabel(ox + wB/2, oy + hL + 35, hidden.includes(3) ? "D" : p.sD, hidden.includes(3));
            addLabel(ox + wB + 25, oy + hR + hI/2, hidden.includes(4) ? "E" : p.sE, hidden.includes(4));
            addLabel(ox + wB + wI/2, oy + hR - 15, hidden.includes(5) ? "F" : p.sF, hidden.includes(5));
        }

        function addLabel(x, y, text, isUnknown) {
            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
            label.setAttribute("x", x);
            label.setAttribute("y", y);
            label.setAttribute("class", "segment-label" + (isUnknown ? " unknown-label" : ""));
            label.textContent = text;
            svg.appendChild(label);
        }

        function checkAnswer() {
            let correct = true;
            const inputs = grid.querySelectorAll('input');
            
            inputs.forEach(input => {
                const id = input.id.replace('in-', '');
                if (parseInt(input.value) !== currentProblem[id]) {
                    correct = false;
                }
            });

            if (correct) {
                feedback.innerText = "🌟 Perfect Architect! Your dimensions are spot on.";
                feedback.className = "status-msg text-center mb-3 text-green-600";
                score += (mode === 'challenge' ? 30 : 10);
                scoreDisplay.innerText = score;
            } else {
                feedback.innerText = "Oops! Those numbers don't fit the blueprint.";
                feedback.className = "status-msg text-center mb-3 text-red-500";
            }
        }

        function showHelp(fieldId) {
            const titleMap = { l: 'Length', w: 'Width', a: 'Area', p: 'Perimeter' };
            const sideLabel = fieldId.startsWith('s') ? fieldId.substring(1) : fieldId;
            document.getElementById('help-title').innerText = `Architect Tip: Finding ${titleMap[fieldId] || 'Side ' + sideLabel}`;
            let helpKey = (fieldId === 'a' || fieldId === 'p') ? fieldId : (mode === 'normal' ? fieldId : 'side');
            document.getElementById('help-text').innerHTML = tips[mode][helpKey];
            document.getElementById('help-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeHelp() {
            document.getElementById('help-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = generateProblem;
    </script>
</body>
</html>
