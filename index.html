<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rectangle Architect - Area & Perimeter Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-brown: #5d4037;
            --leaf-green: #81a263;
            --clay-orange: #e67e5f;
            --cream-paper: #fdfaf1;
            --soft-black: #333333;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f4eee0;
            color: var(--soft-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Fixed height for viewport */
            width: 100vw;
            overflow: hidden; /* Prevent body scroll */
        }

        .retro-card {
            background-color: var(--cream-paper);
            border: 3px solid var(--earth-brown);
            border-radius: 30px 10px 30px 10px;
            box-shadow: 6px 6px 0px var(--earth-brown);
            max-width: 700px;
            width: 90%;
            max-height: 95vh; /* Keep it inside the screen */
            padding: 1.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Scroll inside card if absolutely necessary on tiny screens */
        }

        h1 {
            font-family: 'Gaegu', cursive;
            color: var(--earth-brown);
            font-size: clamp(2rem, 5vh, 3rem); /* Scalable font */
            line-height: 1;
        }

        .organic-btn {
            background-color: var(--leaf-green);
            color: white;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 700;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0px #5e7a45;
            white-space: nowrap;
        }

        .organic-btn:hover {
            transform: translateY(-2px);
            background-color: #6e8c52;
        }

        .organic-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0px #5e7a45;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-field {
            background: #fff;
            border: 2px dashed var(--earth-brown);
            border-radius: 10px;
            padding: 6px;
            width: 80px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--clay-orange);
            font-weight: bold;
        }

        .input-field:focus {
            outline: none;
            border-style: solid;
            background-color: #fffdf5;
        }

        .help-tip-btn {
            position: absolute;
            right: -10px;
            top: 22px;
            background: var(--clay-orange);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid var(--earth-brown);
            transition: transform 0.2s;
            z-index: 10;
        }

        #rectangle-viz {
            border: 4px solid var(--earth-brown);
            background-color: rgba(129, 162, 99, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto; /* Reduced margin for Chromebooks */
            position: relative;
            transition: all 0.5s ease;
            max-width: 100%;
        }

        .label-l { position: absolute; left: -55px; font-weight: bold; color: var(--earth-brown); font-size: 0.85rem; }
        .label-w { position: absolute; top: -30px; font-weight: bold; color: var(--earth-brown); font-size: 0.85rem; }

        .status-msg {
            min-height: 1.25rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .score-pill {
            background: var(--earth-brown);
            color: var(--cream-paper);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .locked {
            background-color: #f0f0f0;
            border-style: solid;
            color: #888;
        }

        /* Help Modal Styles */
        #help-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: white;
            border: 3px solid var(--earth-brown);
            border-radius: 20px;
            padding: 1.25rem;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 90;
        }

        /* Adjustments for tight heights (Chromebooks) */
        @media (max-height: 600px) {
            .retro-card { padding: 1rem; }
            h1 { margin-bottom: 0.25rem; }
            #rectangle-viz { margin: 1rem auto; }
            .grid { gap: 0.5rem; padding: 0.75rem; }
        }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="closeHelp()"></div>
    
    <div id="help-modal">
        <h3 id="help-title" class="text-lg font-bold mb-2 text-stone-800">Architect's Tip</h3>
        <p id="help-text" class="text-sm text-stone-600 mb-4"></p>
        <button onclick="closeHelp()" class="w-full py-2 bg-stone-200 rounded-lg font-bold hover:bg-stone-300">Got it!</button>
    </div>

    <div class="retro-card">
        <div class="flex justify-between items-center mb-2">
            <div class="score-pill">Score: <span id="score">0</span></div>
            <div class="text-[10px] sm:text-xs font-bold text-stone-500 italic">"Measure twice, build once!"</div>
        </div>

        <header class="text-center mb-2">
            <h1>Rectangle Architect</h1>
            <p class="text-xs sm:text-sm text-stone-600">Solve for the missing measurements.</p>
        </header>

        <!-- Visualization Area -->
        <div class="flex-grow flex items-center justify-center min-h-[120px]">
            <div id="rectangle-viz" style="width: 150px; height: 100px;">
                <div id="label-w" class="label-w">Width: ?</div>
                <div id="label-l" class="label-l">Length: ?</div>
            </div>
        </div>

        <!-- Inputs Area -->
        <div class="grid grid-cols-2 gap-x-8 gap-y-4 mb-4 bg-stone-100 p-4 rounded-xl border-2 border-stone-200">
            <div class="input-wrapper">
                <label class="text-[10px] uppercase font-bold text-stone-500 mb-1">Length (L)</label>
                <input type="number" id="in-l" class="input-field" placeholder="?">
                <div id="help-l" class="help-tip-btn" onclick="showHelp('length')">?</div>
            </div>
            <div class="input-wrapper">
                <label class="text-[10px] uppercase font-bold text-stone-500 mb-1">Width (W)</label>
                <input type="number" id="in-w" class="input-field" placeholder="?">
                <div id="help-w" class="help-tip-btn" onclick="showHelp('width')">?</div>
            </div>
            <div class="input-wrapper">
                <label class="text-[10px] uppercase font-bold text-stone-400 mb-1">Area (L × W)</label>
                <input type="number" id="in-a" class="input-field" placeholder="?">
                <div id="help-a" class="help-tip-btn" onclick="showHelp('area')">?</div>
            </div>
            <div class="input-wrapper">
                <label class="text-[10px] uppercase font-bold text-stone-400 mb-1">Perimeter (2L + 2W)</label>
                <input type="number" id="in-p" class="input-field" placeholder="?">
                <div id="help-p" class="help-tip-btn" onclick="showHelp('perimeter')">?</div>
            </div>
        </div>

        <div id="feedback" class="status-msg text-center mb-3"></div>

        <div class="flex flex-wrap justify-center gap-3">
            <button onclick="checkAnswer()" id="check-btn" class="organic-btn">Check Blueprint!</button>
            <button onclick="generateProblem()" class="organic-btn" style="background-color: var(--clay-orange); box-shadow: 0 4px 0px #b05a41;">New Project</button>
        </div>
    </div>

    <script>
        let currentProblem = {};
        let score = 0;

        const elL = document.getElementById('in-l');
        const elW = document.getElementById('in-w');
        const elA = document.getElementById('in-a');
        const elP = document.getElementById('in-p');
        
        const helpBtns = {
            length: document.getElementById('help-l'),
            width: document.getElementById('help-w'),
            area: document.getElementById('help-a'),
            perimeter: document.getElementById('help-p')
        };

        const viz = document.getElementById('rectangle-viz');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');
        const helpModal = document.getElementById('help-modal');
        const overlay = document.getElementById('overlay');

        const tips = {
            length: [
                "<b>If you have the Area:</b> Remember, Area = Length × Width. To find the missing side, divide the Area by the Width!",
                "<b>If you have the Perimeter:</b> Subtract the two Widths from the Perimeter, then divide what's left by 2."
            ],
            width: [
                "<b>If you have the Area:</b> Remember, Area = Length × Width. To find the missing side, divide the Area by the Length!",
                "<b>If you have the Perimeter:</b> Subtract the two Lengths from the Perimeter, then divide what's left by 2."
            ],
            area: [
                "<b>Area is the space inside!</b> Multiply the Length by the Width to find it (L × W)."
            ],
            perimeter: [
                "<b>Perimeter is the distance around!</b> Add up all four sides: L + L + W + W. Or do (L + W) × 2."
            ]
        };

        function generateProblem() {
            feedback.innerText = "";
            feedback.className = "status-msg text-center mb-3";
            
            const length = Math.floor(Math.random() * 9) + 3; // Keep max size a bit smaller for screens
            const width = Math.floor(Math.random() * 9) + 3;
            const area = length * width;
            const perimeter = 2 * (length + width);

            currentProblem = { length, width, area, perimeter };

            const scenarios = [
                ['length', 'area'], 
                ['width', 'area'],
                ['length', 'perimeter'],
                ['width', 'perimeter'],
                ['area', 'perimeter']
            ];

            const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
            
            [elL, elW, elA, elP].forEach(el => {
                el.value = "";
                el.disabled = false;
                el.classList.remove('locked');
            });

            Object.keys(helpBtns).forEach(key => {
                if (scenario.includes(key)) {
                    helpBtns[key].style.display = 'none';
                } else {
                    helpBtns[key].style.display = 'flex';
                }
            });

            if (scenario.includes('length')) setFixed(elL, length);
            if (scenario.includes('width')) setFixed(elW, width);
            if (scenario.includes('area')) setFixed(elA, area);
            if (scenario.includes('perimeter')) setFixed(elP, perimeter);

            updateVisuals();
        }

        function setFixed(el, val) {
            el.value = val;
            el.disabled = true;
            el.classList.add('locked');
        }

        function updateVisuals() {
            // Adaptive scaling for the visualization
            const cardWidth = document.querySelector('.retro-card').offsetWidth;
            const maxVizWidth = cardWidth * 0.5;
            const scale = Math.min(maxVizWidth / 12, 18); // Dynamically calculate scale
            
            viz.style.width = (currentProblem.width * scale) + 'px';
            viz.style.height = (currentProblem.length * scale) + 'px';

            document.getElementById('label-w').innerText = elW.disabled ? `W: ${currentProblem.width}` : `W: ?`;
            document.getElementById('label-l').innerText = elL.disabled ? `L: ${currentProblem.length}` : `L: ?`;
        }

        function showHelp(type) {
            document.getElementById('help-title').innerText = `How to find ${type.charAt(0).toUpperCase() + type.slice(1)}:`;
            let text = "";
            
            if (type === 'length' || type === 'width') {
                text = tips[type].join("<br><br>");
            } else {
                text = tips[type][0];
            }
            
            document.getElementById('help-text').innerHTML = text;
            helpModal.style.display = 'block';
            overlay.style.display = 'block';
        }

        function closeHelp() {
            helpModal.style.display = 'none';
            overlay.style.display = 'none';
        }

        function checkAnswer() {
            const userL = parseInt(elL.value);
            const userW = parseInt(elW.value);
            const userA = parseInt(elA.value);
            const userP = parseInt(elP.value);

            const isCorrect = 
                userL === currentProblem.length &&
                userW === currentProblem.width &&
                userA === currentProblem.area &&
                userP === currentProblem.perimeter;

            if (isCorrect) {
                feedback.innerText = "🌟 Perfect architect! Dimensions verified.";
                feedback.className = "status-msg text-center mb-3 text-green-600";
                score += 10;
                scoreDisplay.innerText = score;
                
                document.getElementById('label-w').innerText = `W: ${currentProblem.width}`;
                document.getElementById('label-l').innerText = `L: ${currentProblem.length}`;
                Object.values(helpBtns).forEach(b => b.style.display = 'none');
            } else {
                feedback.innerText = "Check your measurements! Something is slightly off.";
                feedback.className = "status-msg text-center mb-3 text-red-500";
            }
        }

        // Listen for window resize to adjust rectangle scaling
        window.onresize = updateVisuals;
        window.onload = generateProblem;
    </script>
</body>
</html>
